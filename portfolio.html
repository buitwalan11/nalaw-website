<title>ผลงาน | NALAW</title>

content="รวมผลงานการผลิตเสื้อและงานสกรีนของ NALAW">

<div class="lightbox" id="lightbox">

<span class="close-lightbox"
onclick="closeLightbox()">

✕

</span>

<img id="lightbox-img">

</div>

<script>

function openLightbox(image){

document
.getElementById("lightbox")
.style.display="flex";

document
.getElementById("lightbox-img")
.src=image;

}

function closeLightbox(){

document
.getElementById("lightbox")
.style.display="none";

}

</script>
